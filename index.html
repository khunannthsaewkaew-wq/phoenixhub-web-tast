<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoenixHub - Get Script</title>
    <style>
        /* ตกแต่งหน้าตาเว็บให้เป็นโทนสีดำ-แดง */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #ff4c4c;
            margin-bottom: 10px;
        }
        p {
            color: #bbbbbb;
            margin-bottom: 20px;
        }
        button {
            background-color: #ff4c4c;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #ff1c1c;
        }
        button:disabled {
            background-color: #555555;
            cursor: not-allowed;
        }
        /* ซ่อนกล่องสคริปต์ไว้ก่อน */
        #script-box {
            display: none;
            margin-top: 20px;
        }
        textarea {
            width: 90%;
            height: 80px;
            background-color: #000;
            color: #00ff00;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            resize: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PhoenixHub</h1>
        <p>ทำภารกิจให้สำเร็จเพื่อรับสคริปต์</p>

        <!-- ปุ่มกดไป YouTube -->
        <button id="task-btn" onclick="startTask()">1. กดติดตาม YouTube</button>

        <!-- กล่องใส่สคริปต์ที่จะโชว์หลังทำภารกิจเสร็จ -->
        <div id="script-box">
            <p style="color: #00ff00;">✅ ปลดล็อคสำเร็จ!</p>
            <textarea id="script-code" readonly>loadstring(game:HttpGet("ใส่ลิงก์สคริปต์ raw ของคุณตรงนี้"))()</textarea>
            <button onclick="copyScript()" style="background-color: #4CAF50;">2. คัดลอกสคริปต์</button>
        </div>
    </div>

    <script>
        // ระบบตรวจสอบและปลดล็อค
        function startTask() {
            let taskBtn = document.getElementById("task-btn");
            
            // เปลี่ยนลิงก์ด้านล่างเป็นช่อง YouTube หรือคลิปของคุณ
            window.open("https://www.youtube.com/", "_blank"); 

            // เปลี่ยนปุ่มเป็นสถานะกำลังตรวจสอบ
            taskBtn.innerText = "กำลังตรวจสอบ (รอ 5 วินาที)...";
            taskBtn.disabled = true;

            // ตั้งเวลาดีเลย์ 5 วินาที (5000 มิลลิวินาที) ก่อนโชว์สคริปต์
            setTimeout(function() {
                taskBtn.style.display = "none"; // ซ่อนปุ่มทำภารกิจ
                document.getElementById("script-box").style.display = "block"; // โชว์กล่องสคริปต์
            }, 5000);
        }

        // ระบบก็อปปี้โค้ด
        function copyScript() {
            let scriptCode = document.getElementById("script-code");
            scriptCode.select();
            document.execCommand("copy");
            alert("คัดลอกสคริปต์เรียบร้อยแล้ว!");
        }
    </script>

</body>
</html>
